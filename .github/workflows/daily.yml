name: Daily Pipeline + Digest

on:
  schedule:
    # Todos los días a las 8:00 AM Lima time (UTC-5) = 13:00 UTC
    - cron: '0 13 * * *'
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python -m core.cli run

      - name: Build dashboard
        working-directory: dashboard
        run: |
          npm install
          npm run build

      - name: Commit and push dashboard
        run: |
          git config --global user.name "JobDistiller Bot"
          git config --global user.email "bot@jobdistiller.local"
          git add dashboard/public/data/offers.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily update: $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: Send digest
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python -m core.cli digest

      - name: Upload to Netlify (if configured)
        if: success()
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npx netlify-cli deploy --prod --dir dashboard/dist
